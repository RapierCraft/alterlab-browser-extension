name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please provide enough detail so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
      placeholder: "When I click 'Capture Cookies' on amazon.com, the extension..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Navigate to example.com
        2. Click the AlterLab extension icon
        3. Click "Capture Cookies"
        4. Observe error "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Brave
        - Other Chromium-based
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser Version
      placeholder: "Chrome 124.0.6367.91"
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Visible on the extensions management page
      placeholder: "2.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.2, Ubuntu 22.04, Windows 11, etc."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Output / Errors
      description: Open DevTools on the extension popup or background page and paste any errors. This will be formatted as code automatically.
      render: shell
